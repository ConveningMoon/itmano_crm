name: RLS Tests

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'tests/rls/**'

# All runs share one remote Supabase database with fixed fixture IDs
# (tests/rls/setup.ts). Two concurrent runs interleave createFixtures/
# cleanupFixtures and delete each other's users/leads mid-suite, so runs
# must be serialized repo-wide — never run two in parallel.
concurrency:
  group: rls-tests-shared-db
  cancel-in-progress: false

jobs:
  rls-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run RLS tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
        run: npm run test:rls
